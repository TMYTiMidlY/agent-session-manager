name: release

# Runs on push to main (and manual dispatch). semantic-release analyses
# Conventional Commits since the last tag, derives the next version, updates
# CHANGELOG.md + package.json (committed back to main), builds the native
# binaries, publishes to npm, and creates a GitHub Release with the binaries.
#
# npm auth uses OIDC trusted publishing (`id-token: write`) — no NPM_TOKEN once
# the `asmgr` package has a Trusted Publisher configured for this repo +
# release.yml. A brand-new package must be bootstrapped once (manual
# `npm publish` with 2FA, or a temporary token) before OIDC can work, because a
# Trusted Publisher can only be attached to an already-published package.
# GITHUB_TOKEN is provided automatically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read # 顶层最小权限；发布 job 在下方按需提权

jobs:
  release:
    permissions:
      contents: write # 建 GitHub Release、回推 CHANGELOG/package.json + tag
      issues: write # 在已发布的 issue 上评论
      pull-requests: write # 在已发布的 PR 上评论
      id-token: write # OIDC：npm trusted publishing / provenance
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
