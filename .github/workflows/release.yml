name: release

# Cut a release with semantic-release: analyse Conventional Commits since the
# last tag, derive the next version, update CHANGELOG.md + package.json (and
# commit them back to main), build the native binaries, publish to npm, and
# create a GitHub Release with the binaries attached.
#
# Manually triggered on purpose: running this workflow *is* the release
# approval. It publishes to npm and pushes a release commit + tag, so it should
# only run when you intend to ship. Requires an NPM_TOKEN secret with publish
# rights to the `asmgr` package; GITHUB_TOKEN is provided automatically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
