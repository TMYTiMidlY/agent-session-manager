name: release

# Build the distributable `chronicle` artifacts and attach them to a GitHub
# Release whenever a version tag is pushed. This intentionally does NOT publish
# to any package registry (npm/etc.) — the supported channels are the native
# binaries below and the `npm i -g github:...` one-liner (which builds from
# source via the package `prepare` hook, so it needs no release artifact).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binaries (all targets) + shared bundle
        run: pnpm run binaries

      - name: Smoke-test the Linux binary
        run: |
          ./dist/chronicle-linux-x64 --version
          ./dist/chronicle-linux-x64 html --file fixtures/copilot.events.jsonl -o /tmp/smoke.html
          test -s /tmp/smoke.html
          ./dist/chronicle-linux-x64 md --file fixtures/copilot.events.jsonl -o /tmp/smoke.md
          test -s /tmp/smoke.md

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum chronicle-linux-x64 chronicle-darwin-x64 chronicle-darwin-arm64 \
            chronicle-windows-x64.exe chronicle.mjs > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/chronicle-linux-x64
            dist/chronicle-darwin-x64
            dist/chronicle-darwin-arm64
            dist/chronicle-windows-x64.exe
            dist/chronicle.mjs
            dist/SHA256SUMS.txt
